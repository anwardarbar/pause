name: pause
description: "Pause — Voice-First Personal Expense Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  drift: ^2.14.0
  drift_flutter: ^0.1.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5

  # Voice input
  speech_to_text: ^7.3.0

  # Utilities
  uuid: ^4.3.3
  http: ^1.2.0
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.67.0

  # Permissions
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  drift_dev: ^2.14.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: false
